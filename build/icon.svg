<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4aa7ea"/>
      <stop offset="1" stop-color="#1566c6"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f2fb"/>
    </linearGradient>
  </defs>

  <!-- fond arrondi -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- léger reflet en haut -->
  <rect x="0" y="0" width="512" height="230" rx="112" fill="#ffffff" opacity="0.06"/>

  <!-- goutte d'eau -->
  <path d="M256 96
           C 300 190 370 270 370 330
           a 114 114 0 1 1 -228 0
           C 142 270 212 190 256 96 Z"
        fill="url(#drop)"/>

  <!-- réseau : triangle de 3 nœuds -->
  <g stroke="#2f7fd0" stroke-width="9" stroke-linecap="round" fill="none">
    <line x1="212" y1="298" x2="300" y2="298"/>
    <line x1="300" y1="298" x2="256" y2="362"/>
    <line x1="256" y1="362" x2="212" y2="298"/>
  </g>
  <g fill="#1f6fd0" stroke="#15589f" stroke-width="4">
    <circle cx="212" cy="298" r="15"/>
    <circle cx="300" cy="298" r="15"/>
    <circle cx="256" cy="362" r="15"/>
  </g>
</svg>
